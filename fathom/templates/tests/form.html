{% extends "base.html" %}
{% block title %}Add Test Result — {{ tank.name }} — Fathom{% endblock %}
{% set active = "tests" %}

{% block content %}
<div class="page-header">
  <h1>Add Test Result — {{ tank.name }}</h1>
</div>

<form method="post" action="/tanks/{{ tank.id }}/tests" class="form-card" onsubmit="return prepareLocalTimestamps(this)">
  <div class="form-section">
    <div class="form-group">
      <label>Date &amp; Time</label>
      <input type="datetime-local" class="dt-local" id="test-timestamp">
      <input type="hidden" name="timestamp" class="dt-utc">
    </div>
  </div>
  <div class="form-section">
    <h3>Parameters</h3>
    <p class="muted" style="font-size:.85rem;margin-top:-.5rem;margin-bottom:.75rem">Prefilled from your last test — edit as needed.</p>
    <div class="form-grid">
      <div class="form-group"><label>pH</label><input type="number" step="0.01" name="ph" placeholder="7.0" value="{{ latest.ph if latest and latest.ph is not none else '' }}"></div>
      <div class="form-group"><label>GH (dGH)</label><input type="number" step="0.1" name="gh" value="{{ latest.gh if latest and latest.gh is not none else '' }}"></div>
      <div class="form-group"><label>KH (dKH)</label><input type="number" step="0.1" name="kh" value="{{ latest.kh if latest and latest.kh is not none else '' }}"></div>
      <div class="form-group"><label>Ammonia (ppm)</label><input type="number" step="0.01" name="ammonia" placeholder="0.0" value="{{ latest.ammonia if latest and latest.ammonia is not none else '' }}"></div>
      <div class="form-group"><label>Nitrite (ppm)</label><input type="number" step="0.01" name="nitrite" placeholder="0.0" value="{{ latest.nitrite if latest and latest.nitrite is not none else '' }}"></div>
      <div class="form-group"><label>Nitrate (ppm)</label><input type="number" step="0.1" name="nitrate" value="{{ latest.nitrate if latest and latest.nitrate is not none else '' }}"></div>
      <div class="form-group"><label>TDS (ppm)</label><input type="number" step="1" name="tds" value="{{ latest.tds if latest and latest.tds is not none else '' }}"></div>
      <div class="form-group"><label>Temperature (°F)</label><input type="number" step="0.1" name="temp" value="{{ latest.temp if latest and latest.temp is not none else '' }}"></div>
    </div>
  </div>
  <div class="form-section">
    <div class="form-group"><label>Notes</label><textarea name="notes" rows="3"></textarea></div>
  </div>
  <div class="form-actions">
    <a href="/tanks/{{ tank.id }}" class="btn btn-ghost">Cancel</a>
    <button type="submit" class="btn btn-primary">Save Test Result</button>
  </div>
</form>
<script>
  (function () {
    var input = document.getElementById('test-timestamp');
    var now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    input.value = now.toISOString().slice(0, 16);
  })();
</script>
{% endblock %}
