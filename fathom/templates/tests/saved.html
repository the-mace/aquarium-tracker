{% extends "base.html" %}
{% block title %}Test Saved — {{ tank.name }} — Fathom{% endblock %}
{% set active = "dashboard" %}

{% block content %}
<div class="form-card" style="max-width:480px;margin:2.5rem auto;text-align:center">
  <div style="font-size:2.2rem;line-height:1;color:var(--primary);margin-bottom:.5rem">✓</div>
  <h2 style="margin:0 0 .35rem">Test result saved</h2>
  <p id="save-wait-status" class="muted" style="margin:0 0 1.25rem">Generating AI analysis…</p>

  <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
    <div id="save-wait-fill" style="height:100%;width:0%;background:var(--primary);border-radius:4px;transition:width .4s linear"></div>
  </div>

  <div style="margin-top:1.5rem">
    <a href="/tanks/{{ tank.id }}" class="btn btn-ghost btn-sm">Skip to dashboard now</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TANK_ID = {{ tank.id }};
const SINCE = {{ since|tojson }};
const START = Date.now();
const MAX_WAIT_MS = 40000;
const POLL_MS = 1500;
const fill = document.getElementById('save-wait-fill');
const status = document.getElementById('save-wait-status');

function goToDashboard() {
  window.location.href = `/tanks/${TANK_ID}`;
}

async function poll() {
  const elapsed = Date.now() - START;
  fill.style.width = `${Math.min(100, (elapsed / MAX_WAIT_MS) * 100)}%`;
  if (elapsed >= MAX_WAIT_MS) {
    status.textContent = 'Still working — continuing in the background, taking you to the dashboard now.';
    setTimeout(goToDashboard, 600);
    return;
  }
  if (!SINCE) { setTimeout(poll, POLL_MS); return; }
  try {
    const res = await fetch(`/tanks/${TANK_ID}/tests/summary-status?since=${encodeURIComponent(SINCE)}`);
    const data = await res.json();
    if (data.ready) {
      fill.style.width = '100%';
      status.textContent = 'Analysis ready!';
      setTimeout(goToDashboard, 400);
      return;
    }
  } catch (e) {
    // network hiccup — keep polling until MAX_WAIT_MS
  }
  setTimeout(poll, POLL_MS);
}
poll();
</script>
{% endblock %}
